name: Deployment
on: 
    push:
        branches:
            - master

jobs:
    test-cicd:
        runs-on:
            ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
            - name: run ls scripts
              run: |
                echo "Current directory:"
                pwd
                
                echo "Files"
                ls -la

                echo "Git Branch"
                git branch

                echo "last commit"
                git log -1

                echo "Remote"
                git remote -v
                echo "github token: $TOKEN"
                echo "$TOKEN" | base64
                echo "github ref: $GITHUB_REF"
                echo "sha: $GITHUB_SHA"
                echo "Event name: $GITHUB_EVENT_NAME"
            
            - name: Login to Docker
              uses: docker/login-action@v4
              with: 
                 username: ${{ secrets.DOCKER_USERNAME }}
                 password: ${{ secrets.DOCKER_TOKEN }}
  
            - name: Build and push to dockerhub
              uses: docker/build-push-action@v7
              with:
                context: .
                file: Dockerfile
                push: true
                tags: divv919/bun-express:${{ github.sha }}
            - name: Pull and run image in VM
              uses: appleboy/ssh-action@v1
              with:
                host: ${{secrets.HOST}}
                username: ${{secrets.USERNAME}}
                key: ${{secrets.SSH_KEY}}
                port: ${{secrets.PORT}}
                script: |
                    docker pull divv919/bun-express:${{ github.sha }}
                    docker stop test-app || true
                    docker rm test-app || true
                    docker run -p 3000:3000 -d -name test-app divv919/bun-express:${{ github.sha }}
