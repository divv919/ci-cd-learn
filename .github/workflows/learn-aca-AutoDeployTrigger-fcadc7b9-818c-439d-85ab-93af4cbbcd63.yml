name: Trigger auto deployment for learn-aca

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ master ]
    paths:
    - '**'
    - '.github/workflows/learn-aca-AutoDeployTrigger-fcadc7b9-818c-439d-85ab-93af4cbbcd63.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.LEARNACA_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.LEARNACA_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.LEARNACA_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: learnregistry2.azurecr.io
          registryUsername: ${{ secrets.LEARNACA_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.LEARNACA_REGISTRY_PASSWORD }}
          containerAppName: learn-aca
          resourceGroup: learn-scale
          imageToBuild: learnregistry2.azurecr.io/learn-aca:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


